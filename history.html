<!DOCTYPE html>
<html>
<head>
  <title>History 💗</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #ffd1dc);
      background-attachment: fixed;
      margin: 0;
      text-align: center;
    }

    h2 { margin-top: 20px; }

    .back-btn {
      margin: 15px;
      padding: 10px 20px;
      border: none;
      background: #ff69b4;
      color: white;
      border-radius: 8px;
    }

    .filter-box {
      margin: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ffb6c1;
    }

    .table-container {
      width: 95%;
      margin: 15px auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    th {
      background: linear-gradient(45deg, #ff85a2, #ff4d6d);
      color: white;
      padding: 12px;
      font-size: 14px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #ffe4ec;
      font-size: 14px;
    }

    tr:hover {
      background: #fff0f5;
    }

    .income { color: #2ecc71; font-weight: bold; }
    .expense { color: #ff4d6d; font-weight: bold; }

    .empty {
      margin-top: 30px;
      color: gray;
    }

    tr.swipe-active {
      background: #ffd1dc !important;
      transition: 0.2s;
    }
  </style>
</head>

<body>

<h2>📜 Transaction History</h2>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="filter-box">
  <!-- TYPE FILTER -->
  <select id="typeFilter" onchange="renderTable()">
    <option value="all">All Types</option>
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>

  <!-- MONTH FILTER -->
  <select id="monthFilter" onchange="renderTable()">
    <option value="all">All Months</option>
  </select>
</div>

<div class="table-container">
  <table id="historyTable">
    <thead>
      <tr>
        <th>Type</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Notes</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="emptyMsg" class="empty"></div>

<script>
let data = JSON.parse(localStorage.getItem("transactions")) || [];

const monthFilter = document.getElementById("monthFilter");

/* LOAD MONTHS */
function loadMonths() {
  const months = new Set();

  data.forEach(t => {
    if (t.date) {
      const d = new Date(t.date);
      const key = d.getFullYear() + "-" + (d.getMonth() + 1);
      months.add(key);
    }
  });

  months.forEach(m => {
    const [y, mo] = m.split("-");
    const date = new Date(y, mo - 1);

    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = date.toLocaleString("en-IN", {
      month: "long",
      year: "numeric"
    });

    monthFilter.appendChild(opt);
  });
}

/* FORMAT DATE */
function formatDate(dateStr) {
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-IN', {
    day: '2-digit',
    month: 'short',
    year: 'numeric'
  });
}

/* RENDER TABLE */
function renderTable() {
  const tbody = document.querySelector("#historyTable tbody");
  const typeFilter = document.getElementById("typeFilter").value;
  const monthVal = document.getElementById("monthFilter").value;
  const emptyMsg = document.getElementById("emptyMsg");

  tbody.innerHTML = "";

  let filtered = data.filter(t => {

    // TYPE FILTER
    if (typeFilter !== "all" && t.type !== typeFilter) return false;

    // MONTH FILTER
    if (monthVal !== "all") {
      const d = new Date(t.date);
      const key = d.getFullYear() + "-" + (d.getMonth() + 1);
      if (key !== monthVal) return false;
    }

    return true;
  });

  if (filtered.length === 0) {
    emptyMsg.innerText = "No transactions found 💔";
    return;
  } else {
    emptyMsg.innerText = "";
  }

  filtered.reverse().forEach((t, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="${t.type}">${t.type.toUpperCase()}</td>
      <td>${t.category}</td>
      <td>Rs. ${t.amount}</td>
      <td>${t.notes || "-"}</td>
      <td>${formatDate(t.date)}</td>
    `;

    /* SWIPE DELETE */
    let startX = 0;

    tr.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
      tr.classList.add("swipe-active");
    });

    tr.addEventListener("touchend", e => {
      const endX = e.changedTouches[0].clientX;
      tr.classList.remove("swipe-active");

      if (endX - startX > 80) {
        deleteItem(i);
      }
    });

    tbody.appendChild(tr);
  });
}

/* DELETE */
function deleteItem(index) {
  if (!confirm("Delete this transaction?")) return;

  data.splice(index, 1);
  localStorage.setItem("transactions", JSON.stringify(data));
  renderTable();
}

/* BACK */
function goBack() {
  window.location.href = "index.html";
}

/* INIT */
loadMonths();
renderTable();
</script>

</body>
</html>
