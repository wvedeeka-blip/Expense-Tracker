<!DOCTYPE html>
<html>
<head>
 <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff69b4">
  
  <title>Expense Tracker 💗</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #ffd1dc);
      background-attachment: fixed;
      color: #5a3d5c;
      text-align: center;
      margin: 0;
      padding-bottom: 120px;
    }

    h1 {
      margin-top: 20px;
      font-size: 30px;
    }

    .summary {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      width: 120px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .card-title {
      font-size: 14px;
      color: gray;
    }

    .card-value {
      display: flex;
      justify-content: center;
      gap: 4px;
      font-size: 18px;
      font-weight: bold;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
    }

    .top-btn {
      padding: 12px 28px;
      font-size: 16px;
      background: linear-gradient(45deg, #ff85a2, #ff4d6d);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .add-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      padding: 16px 30px;
      background: linear-gradient(45deg, #ff69b4, #ff4d6d);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      z-index: 1000;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(5px);
      background: rgba(0,0,0,0.3);
      justify-content: center;
      align-items: center;
    }

    .form {
      background: white;
      padding: 25px;
      width: 90%;
      max-width: 350px;
      border-radius: 12px;
    }

    input, select {
      margin: 10px 0;
      padding: 12px;
      width: 90%;
      border-radius: 8px;
      border: 1px solid #ffb6c1;
    }

    .form button {
      padding: 10px 20px;
      margin: 10px 5px;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>💗 Expense Tracker</h1>

<div class="summary">
  <div class="card">
    <div class="card-title">Income</div>
    <div class="card-value">Rs. <span id="income">0</span></div>
  </div>

  <div class="card">
    <div class="card-title">Expense</div>
    <div class="card-value">Rs. <span id="expense">0</span></div>
  </div>

  <div class="card">
    <div class="card-title">Net</div>
    <div class="card-value">Rs. <span id="balance">0</span></div>
  </div>
</div>

<div class="btn-row">
  <button class="top-btn" onclick="window.location.href='chart.html'">📊 Chart</button>
  <button class="top-btn" onclick="window.location.href='history.html'">📜 History</button>
</div>

<button class="add-btn" onclick="toggleForm()">➕ Add Transaction</button>

<div class="overlay" id="overlay">
  <div class="form">
    <h3>Add Transaction 💕</h3>

    <select id="type">
      <option value="">Type</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <select id="category">
      <option value="">Category</option>
      <option>Food</option>
      <option>Travel</option>
      <option>Study</option>
      <option>Shopping</option>
      <option>Fun</option>
    </select>

    <input type="number" id="amount" placeholder="Amount">
    <input type="text" id="notes" placeholder="Notes">

    <!-- 💥 AUTO DATE -->
    <input type="date" id="date">

    <button onclick="addTransaction()">Save</button>
    <button onclick="toggleForm()">Cancel</button>
  </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

/* 💥 AUTO DATE FUNCTION */
function setTodayDate() {
  const dateInput = document.getElementById("date");
  const today = new Date().toISOString().split("T")[0];
  dateInput.value = today;
}

function toggleForm() {
  const overlay = document.getElementById("overlay");
  const btn = document.querySelector(".add-btn");

  const isOpen = overlay.style.display === "flex";

  overlay.style.display = isOpen ? "none" : "flex";
  btn.style.display = isOpen ? "block" : "none";

  if (!isOpen) setTodayDate(); // 💥 auto fill date when opening
}

function addTransaction() {
  const type = document.getElementById("type").value;
  const category = document.getElementById("category").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const notes = document.getElementById("notes").value;
  const date = document.getElementById("date").value;

  if (!type || !category || !amount || !date) {
    alert("Fill all fields!");
    return;
  }

  transactions.push({ type, category, amount, notes, date });
  localStorage.setItem("transactions", JSON.stringify(transactions));

  toggleForm();
  render();
}

function render() {
  let income = 0, expense = 0;

  transactions.forEach(t => {
    t.type === "income" ? income += t.amount : expense += t.amount;
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;
  document.getElementById("balance").innerText = income - expense;
}

render();
</script>

</body>
</html>
